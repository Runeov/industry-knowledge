backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "hero"
    label: "Hero Section"
    folder: "content/hero"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "name", label: "Name", widget: "string" }
      - { name: "tagline", label: "Tagline", widget: "string" }
      - { name: "intro", label: "Short Intro", widget: "text" }

  - name: "about"
    label: "About Me"
    folder: "content/about"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "bio", label: "Bio", widget: "text" }
      - { name: "picture", label: "Profile Picture", widget: "image" }
      - { name: "background", label: "Background Info", widget: "markdown" }

  - name: "skills"
    label: "Skills"
    folder: "content/skills"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Skill Name", widget: "string" }
      - { name: "icon", label: "Icon URL", widget: "string" }
      - { name: "level", label: "Proficiency (1-100)", widget: "number", min: 0, max: 100 }

  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "text" }
      - { name: "tech", label: "Technologies Used", widget: "list" }
      - { name: "live", label: "Live Link", widget: "string" }
      - { name: "repo", label: "Repo Link", widget: "string" }

  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime" }
      - { name: "image", label: "Featured Image", widget: "image" }
      - { name: "body", label: "Content", widget: "markdown" }

  - name: "contact"
    label: "Contact Info"
    folder: "content/contact"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "email", label: "Email", widget: "string" }
      - { name: "phone", label: "Phone", widget: "string", required: false }
      - { name: "address", label: "Address", widget: "string", required: false }
